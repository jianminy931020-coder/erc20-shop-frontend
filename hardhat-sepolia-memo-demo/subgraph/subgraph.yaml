specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MemoStorage
    network: sepolia
    source:
      address: "0xd23d799017945692cb1233e889f65aa61a50c9c5"
      abi: MemoStorage
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - MemoRecord
      abis:
        - name: MemoStorage
          file: ./abis/MemoStorage.json
      eventHandlers:
        - event: MemoStored(indexed address,indexed address,uint256,string,uint256)
          handler: handleMemoStored
      file: ./src/mapping.ts
