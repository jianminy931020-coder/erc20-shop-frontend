# MemoRecord: 每次调用 sendWithMemo 都会写入一条记录。
type MemoRecord @entity(immutable: true) {
  # 唯一主键：使用 txHash + logIndex 组合，避免同一交易多日志冲突。
  id: Bytes!

  # 事件里的 from 地址（发送者）。
  from: Bytes!

  # 事件里的 to 地址（收款人）。
  to: Bytes!

  # 事件里的 amount（单位 wei）。
  amount: BigInt!

  # 事件里的 memo（这里存的是编码后的备注字符串）。
  memo: String!

  # 事件里的 timestamp（合约 emit 时传出的区块时间戳）。
  timestamp: BigInt!
}
